services:
  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: python -m bot.main

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feral_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feral_pass}
      POSTGRES_DB: ${POSTGRES_DB:-feral_db}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feral_user} -d ${POSTGRES_DB:-feral_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
